<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugopigstudios</title>
    <style>
        body {
            background: #111;
            color: #ccc;
            font-family: monospace;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            color: #fff;
            font-weight: normal;
        }

        h1 {
            margin-bottom: 5px;
        }

        a {
            color: #ff4757;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .links {
            margin-bottom: 40px;
        }

        section {
            margin-bottom: 40px;
        }

        .game-item {
            border: 1px solid #333;
            padding: 20px;
            margin-top: 15px;
            background: #161616;
        }

        .game-meta {
            margin-bottom: 15px;
        }

        .game-icon {
            width: 64px;
            height: 64px;
            background: #222;
            float: left;
            margin-right: 15px;
            border: 1px solid #444;
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .clear {
            clear: both;
        }

        .iframe-wrapper {
            margin-top: 15px;
            border: 1px solid #333;
            background: #000;
        }

        iframe {
            display: block;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Hugopigstudios</h1>
    <p style="margin-top: 0; color: #777;">Solo Game Developer</p>

    <div class="links">
        <a href="https://www.youtube.com/@Hugopigstudios" target="_blank">YouTube</a> | 
        <a href="https://hugopigstudios.itch.io" target="_blank">Itch.io</a>
    </div>

    <section>
        <h2>About Me</h2>
        <p>I make indie games and I own a YouTube channel called "HugoPigStudios". I make most of my games by myself.</p>
    </section>

    <section>
        <h2>Games</h2>
        
        <div class="game-item">
            <div class="game-meta">
                <div class="game-icon">
                    <img src="icon.png" alt="" onerror="this.style.display='none';">
                </div>
                <strong style="font-size: 1.2rem;"><a href="https://hugopigstudios.itch.io/scrap-racers" target="_blank">Scrap Racers</a></strong>
                <p style="margin: 5px 0 0 0; color: #777;">Released on Itch.io</p>
            </div>
            
            <div class="clear"></div>
            
            <div class="iframe-wrapper">
                <iframe src="https://itch.io/embed/4408849?bg_color=161616&amp;fg_color=ccc&amp;link_color=ff4757" width="552" height="167">
                    <a href="https://hugopigstudios.itch.io/scrap-racers">Scrap Racers by HugoPigStudios</a>
                </iframe>
            </div>
        </div>
    </section>

</body>
</html>
