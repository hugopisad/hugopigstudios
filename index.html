<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugopigstudio's Website</title>
    <style>
        /* Reset default margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar Styles */
        .topbar {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .topbar h1 {
            font-size: 1.5rem;
            font-weight: normal;
        }

        /* Main Content Area (Centers the button) */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* YouTube Button Styles */
        .youtube-btn {
            background-color: #ff0000; /* YouTube Red */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        /* Hover effect for the button */
        .youtube-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Topbar -->
    <div class="topbar">
        <h1>Welcome to Hugopigstudio's Website</h1>
    </div>

    <!-- Center Content -->
    <div class="content">
        <a href="https://www.youtube.com/@Hugopigstudios" target="_blank" class="youtube-btn">
            Subscribe on YouTube
        </a>
    </div>

</body>
</html>
